<!DOCTYPE html>
<html>
<head>
    <title>3D Beyin Ağı Karşılaştırması</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        .label { position: absolute; text-align: center; width: 33%; bottom: 20px; color: white; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="label" style="left:0">1. SAĞLIKLI</div>
    <div class="label" style="left:33%">2. ALZHEIMER</div>
    <div class="label" style="left:66%">3. DOWN SENDROMU</div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 30); // Kamerayı iyice geriye çektik (Garantili görüş)

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // Işık (Olmazsa her yer simsiyah görünür)
        const light = new THREE.PointLight(0xffffff, 2, 200);
        light.position.set(10, 10, 20);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        function createNet(xOffset, color, prob, isDS = false) {
            const group = new THREE.Group();
            const nodes = [];
            const geo = new THREE.SphereGeometry(0.4, 16, 16);
            const mat = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 });

            for(let i=0; i<30; i++) {
                const n = new THREE.Mesh(geo, mat);
                n.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
                group.add(n);
                nodes.push(n);
            }

            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.3, transparent: true });
            for(let i=0; i<nodes.length; i++) {
                for(let j=i+1; j<nodes.length; j++) {
                    const d = nodes[i].position.distanceTo(nodes[j].position);
                    let c = Math.random() < prob;
                    if(isDS && d > 3) c = false; 
                    if(c) {
                        const g = new THREE.BufferGeometry().setFromPoints([nodes[i].position, nodes[j].position]);
                        group.add(new THREE.Line(g, lineMat));
                    }
                }
            }
            group.position.x = xOffset;
            scene.add(group);
            return group;
        }

        const n1 = createNet(-12, 0x00ff00, 0.3); // Yeşil - Sağlıklı
        const n2 = createNet(0, 0xff0000, 0.05);  // Kırmızı - Alzheimer
        const n3 = createNet(12, 0xffff00, 0.4, true); // Sarı - Down Sendromu

        function animate() {
            requestAnimationFrame(animate);
            n1.rotation.y += 0.005;
            n2.rotation.y += 0.005;
            n3.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
