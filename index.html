<!DOCTYPE html>
<html>
<head>
    <title>3D Beyin Ağı Karşılaştırması</title>
    <style>
        body { margin: 0; overflow: hidden; background: #05050a; font-family: 'Segoe UI', sans-serif; }
        .label {
            position: absolute; text-align: center; width: 33.3%; bottom: 30px;
            color: #ffffff; text-shadow: 0 0 10px #00d4ff; font-size: 14px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="label" style="left: 0;"><b>1. SAĞLIKLI BEYİN</b></div>
    <div class="label" style="left: 33.3%;"><b>2. ALZHEIMER MODELİ</b></div>
    <div class="label" style="left: 66.6%;"><b>3. D.S. SENDROMU MODELİ</b></div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 48);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const light = new THREE.PointLight(0xffffff, 2);
        light.position.set(0, 10, 30);
        scene.add(light);

        const nodeGeo = new THREE.SphereGeometry(0.3, 20, 20);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.4, transparent: true });

        // --- 1. SAĞLIKLI (YEŞİL - YOĞUN) ---
        function createHealthy(x) {
            const group = new THREE.Group();
            const nodes = [];
            const mat = new THREE.MeshPhongMaterial({ color: 0x00ffaa, emissive: 0x00ffaa });
            for(let i=0; i<80; i++) {
                const n = new THREE.Mesh(nodeGeo, mat);
                n.position.set((Math.random()-0.5)*16, (Math.random()-0.5)*16, (Math.random()-0.5)*16);
                group.add(n); nodes.push(n);
            }
            nodes.forEach((n1, i) => {
                nodes.slice(i+1).forEach(n2 => {
                    if(n1.position.distanceTo(n2.position) < 6) {
                        const g = new THREE.BufferGeometry().setFromPoints([n1.position, n2.position]);
                        group.add(new THREE.Line(g, lineMat));
                    }
                });
            });
            group.position.x = x; scene.add(group); return group;
        }

        // --- 2. ALZHEIMER (KIRMIZI - GÖRSELDEKİ C FORMU) ---
        function createAlzheimer(x) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0xff3333, emissive: 0xff0000 });
            const nodes = [];
            for(let i=0; i<25; i++) {
                const a = (i/25) * Math.PI * 1.5;
                const n = new THREE.Mesh(nodeGeo, mat);
                n.position.set(Math.cos(a)*7 + (Math.random()-0.5)*2, Math.sin(a)*7 + (Math.random()-0.5)*2, (Math.random()-0.5)*3);
                nodes.push(n);
            }
            nodes.forEach((n1, i) => {
                let hasLink = false;
                nodes.forEach((n2, j) => {
                    if(i!==j && n1.position.distanceTo(n2.position) < 5 && Math.random() < 0.2) {
                        const g = new THREE.BufferGeometry().setFromPoints([n1.position, n2.position]);
                        group.add(new THREE.Line(g, lineMat));
                        hasLink = true;
                    }
                });
                if(hasLink) group.add(n1); // Sadece bağlı olanları ekle
            });
            group.position.x = x; scene.add(group); return group;
        }

        // --- 3. DOWN SENDROMU (SARI - TAM 4 DAİRESEL KLİK) ---
        function createDS(x) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: 0xffdd00, emissive: 0xffaa00 });
            // Görseldeki 4'lü yapıyı oluşturmak için merkezler:
            const centers = [{x:-4, y:4}, {x:4, y:4}, {x:-4, y:-4}, {x:4, y:-4}];
            
            centers.forEach(c => {
                const cluster = [];
                for(let i=0; i<10; i++) {
                    const n = new THREE.Mesh(nodeGeo, mat);
                    const ang = (i/10) * Math.PI * 2;
                    n.position.set(c.x + Math.cos(ang)*3.5, c.y + Math.sin(ang)*3.5, (Math.random()-0.5)*2);
                    group.add(n); cluster.push(n);
                }
                // Her cluster içindeki noktaları birbirine bağlayarak "klik" yap:
                cluster.forEach((n1, i) => {
                    cluster.slice(i+1).forEach(n2 => {
                        const g = new THREE.BufferGeometry().setFromPoints([n1.position, n2.position]);
                        group.add(new THREE.Line(g, lineMat));
                    });
                });
            });
            group.position.x = x; scene.add(group); return group;
        }

        const g1 = createHealthy(-22);
        const g2 = createAlzheimer(0);
        const g3 = createDS(22);

        function animate() {
            requestAnimationFrame(animate);
            g1.rotation.y += 0.002;
            g2.rotation.y += 0.001;
            g3.rotation.y += 0.002;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
